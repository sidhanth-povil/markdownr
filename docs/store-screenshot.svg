<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <rect width="1280" height="800" fill="#f4f3f1"/>

  <!-- faint watermark -->
  <g transform="translate(-40 470) scale(9)" opacity="0.05">
    <path d="M7.5 30V12L13.25 21L19 12V30" fill="none" stroke="#1e1e1e" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M32.5 11V30" fill="none" stroke="#1e1e1e" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="27.8" cy="25.3" r="4.7" fill="none" stroke="#1e1e1e" stroke-width="3.8"/>
  </g>

  <!-- left copy -->
  <text x="96" y="150" font-family="ui-monospace,Menlo,monospace" font-size="16" letter-spacing="3" fill="#fb411f">BROWSER EXTENSION</text>
  <text x="94" y="232" font-size="58" font-weight="800" letter-spacing="-2.5" fill="#1e1e1e">Save any page as</text>
  <text x="94" y="298" font-size="58" font-weight="800" letter-spacing="-2.5" fill="#1e1e1e">clean Markdown.</text>
  <text x="96" y="356" font-size="24" fill="#5b6072">Even the pages an AI can't open —</text>
  <text x="96" y="388" font-size="24" fill="#5b6072">logged-in, localhost, paywalled.</text>

  <g transform="translate(96 452)" font-family="ui-monospace,Menlo,monospace" font-size="16" fill="#6f6f6b">
    <rect x="0" y="-11" width="10" height="10" rx="2.5" fill="#fb411f"/><text x="20" y="0">100% local</text>
    <rect x="150" y="-11" width="10" height="10" rx="2.5" fill="#fb411f"/><text x="170" y="0">zero tracking</text>
    <rect x="320" y="-11" width="10" height="10" rx="2.5" fill="#fb411f"/><text x="340" y="0">one click</text>
  </g>
  <text x="96" y="560" font-size="19" fill="#8a8a86">Reader · Full page · Selection — toolbar, Alt+M, or right-click.</text>

  <!-- popup card -->
  <g transform="translate(726 96)">
    <rect x="-6" y="-6" width="472" height="620" rx="20" fill="#000" opacity="0.05"/>
    <rect width="460" height="608" rx="18" fill="#ffffff" stroke="#e7e8ef"/>

    <!-- header -->
    <g transform="translate(20 20)">
      <g transform="scale(0.62)"><rect width="40" height="40" rx="10" fill="#fb411f"/><path d="M7.5 30V12L13.25 21L19 12V30" fill="none" stroke="#fff" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M32.5 11V30" fill="none" stroke="#fff" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="27.8" cy="25.3" r="4.7" fill="none" stroke="#fff" stroke-width="3.8"/></g>
      <text x="34" y="18" font-size="17" font-weight="700" fill="#1e1e1e">Markdownr</text>
      <text x="404" y="17" text-anchor="end" font-size="12" fill="#9aa0ab">Alt+M</text>
    </g>

    <!-- mode tabs -->
    <g transform="translate(20 54)">
      <rect x="0" y="0" width="138" height="34" rx="9" fill="#fb411f"/><text x="69" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Reader</text>
      <rect x="146" y="0" width="138" height="34" rx="9" fill="#f1f1f4"/><text x="215" y="22" text-anchor="middle" font-size="14" fill="#6b7280">Full page</text>
      <rect x="292" y="0" width="128" height="34" rx="9" fill="#f1f1f4"/><text x="356" y="22" text-anchor="middle" font-size="14" fill="#6b7280">Selection</text>
    </g>

    <!-- toggles -->
    <g transform="translate(20 106)" font-size="13.5" fill="#374151">
      <rect x="0" y="-11" width="14" height="14" rx="3" fill="#fb411f"/><path d="M3 -4 L6 -1 L11 -8" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="20" y="1">Images</text>
      <rect x="92" y="-11" width="14" height="14" rx="3" fill="#fb411f"/><path d="M95 -4 L98 -1 L103 -8" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="112" y="1">Links</text>
      <rect x="168" y="-11" width="14" height="14" rx="3" fill="#fb411f"/><path d="M171 -4 L174 -1 L179 -8" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="188" y="1">Frontmatter</text>
      <rect x="300" y="-11" width="14" height="14" rx="3" fill="#fb411f"/><path d="M303 -4 L306 -1 L311 -8" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="320" y="1">Absolute URLs</text>
    </g>

    <!-- tags input -->
    <g transform="translate(20 128)">
      <rect width="420" height="34" rx="8" fill="#f7f7f9" stroke="#e5e7eb"/>
      <text x="12" y="22" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#1e1e1e">research, ai/transformers</text>
    </g>

    <!-- preview -->
    <g transform="translate(20 176)">
      <rect width="420" height="300" rx="9" fill="#f7f7f9" stroke="#e5e7eb"/>
      <g transform="translate(14 26)" font-family="ui-monospace,Menlo,monospace" font-size="12.5">
        <text y="0" fill="#9aa0ab">---</text>
        <text y="19"><tspan fill="#fb411f">title</tspan><tspan fill="#4b5563">: "Attention Is All You Need"</tspan></text>
        <text y="38"><tspan fill="#fb411f">url</tspan><tspan fill="#4b5563">: "https://arxiv.org/abs/1706.03762"</tspan></text>
        <text y="57"><tspan fill="#fb411f">author</tspan><tspan fill="#4b5563">: "Vaswani, Ashish"</tspan></text>
        <text y="76"><tspan fill="#fb411f">date</tspan><tspan fill="#4b5563">: "2017/06/12"</tspan></text>
        <text y="95"><tspan fill="#fb411f">tags</tspan><tspan fill="#4b5563">: [research, ai/transformers]</tspan></text>
        <text y="114" fill="#9aa0ab">---</text>
        <text y="147" fill="#1e1e1e" font-weight="600"># Attention Is All You Need</text>
        <text y="176" fill="#4b5563">The dominant sequence transduction models</text>
        <text y="194" fill="#4b5563">are based on complex recurrent or</text>
        <text y="212" fill="#4b5563">convolutional neural networks...</text>
        <text y="245" fill="#1e1e1e" font-weight="600">## Model Architecture</text>
        <text y="274" fill="#4b5563">Most competitive neural sequence models…</text>
      </g>
    </g>

    <text x="440" y="494" text-anchor="end" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#9aa0ab">1,240 chars · ~310 tokens</text>

    <!-- actions -->
    <g transform="translate(20 506)">
      <rect x="0" width="134" height="42" rx="10" fill="#fb411f"/><text x="67" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Copy</text>
      <rect x="143" width="134" height="42" rx="10" fill="#f1f1f4"/><text x="210" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#374151">Download</text>
      <rect x="286" width="134" height="42" rx="10" fill="#f1f1f4"/><text x="353" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#374151">As prompt</text>
    </g>

    <!-- cite + all tabs -->
    <g transform="translate(20 566)" font-size="13" fill="#7c7c7c">
      <text x="0" y="0">Cite:</text>
      <text x="42" y="0" fill="#fb411f" text-decoration="underline">BibTeX</text>
      <text x="104" y="0" fill="#fb411f" text-decoration="underline">RIS</text>
      <line x1="150" y1="-13" x2="150" y2="4" stroke="#e5e7eb"/>
      <text x="166" y="0">All tabs:</text>
      <text x="230" y="0" fill="#fb411f" text-decoration="underline">Copy</text>
      <text x="284" y="0" fill="#fb411f" text-decoration="underline">Download</text>
    </g>
  </g>
</svg>
